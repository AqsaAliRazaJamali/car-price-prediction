<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuation Interface - ValuDrive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 1.4rem; cursor: pointer;" onclick="window.location.href='/'">🚗 ValuDrive AI</div>
        <button class="theme-toggle" id="themeToggle">☀️ Light Mode</button>
    </header>

    <main class="glass-card">
        <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.5rem;">Vehicle Metrics</h2>
        
        <div class="error-alert" id="errorAlert"></div>

        <form id="predictionForm">
            <div class="grid-form">
                <div class="form-group">
                    <label for="brand">Brand / Category</label>
                    <select id="brand" required>
                        <option value="city">Honda City</option>
                        <option value="ciaz">Maruti Ciaz</option>
                        <option value="swift">Maruti Swift</option>
                        <option value="fortuner">Toyota Fortuner</option>
                        <option value="innova">Toyota Innova</option>
                        <option value="i20">Hyundai i20</option>
                        <option value="Royal">Royal Enfield Bike</option>
                        <option value="KTM">KTM Bike</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">Manufacturing Year</label>
                    <input type="number" id="year" min="2000" max="2026" value="2015" required>
                </div>

                <div class="form-group">
                    <label for="present_price">Original Showroom Price (in Lakhs)</label>
                    <input type="number" step="0.01" id="present_price" value="9.5" required>
                </div>

                <div class="form-group">
                    <label for="kms_driven">Kilometers Driven</label>
                    <input type="number" id="kms_driven" value="30000" required>
                </div>

                <div class="form-group">
                    <label for="fuel_type">Fuel Type</label>
                    <select id="fuel_type" required>
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="CNG">CNG</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="seller_type">Seller Type</label>
                    <select id="seller_type" required>
                        <option value="Dealer">Dealer</option>
                        <option value="Individual">Individual</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="transmission">Transmission</label>
                    <select id="transmission" required>
                        <option value="Manual">Manual</option>
                        <option value="Automatic">Automatic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="owner">Previous Owners</label>
                    <input type="number" id="owner" min="0" max="3" value="0" required>
                </div>
            </div>

            <div class="actions-row">
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
                <button type="submit" class="btn">Predict Valuation</button>
            </div>
        </form>

        <div class="spinner" id="loadingSpinner"></div>

        <section class="results-panel" id="resultsPanel">
            <h3>Calculated Target Valuation</h3>
            <div class="price-display" id="calcPrice">$0.00</div>
            
            <div class="meta-grid">
                <div><strong>Selected Model Type:</strong></div>
                <div id="calcEngine">None</div>
                <div><strong>Model Confidence ($R^2$):</strong></div>
                <div id="calcConf">0.0%</div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
